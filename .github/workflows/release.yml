name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare archive (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          pkg="mod-updater-${{ matrix.target }}"
          mkdir -p "$pkg"
          cp "target/${{ matrix.target }}/release/mod-updater" "$pkg/"
          tar -czf "${pkg}.tar.gz" "$pkg"
          shasum -a 256 "${pkg}.tar.gz" > "${pkg}.sha256"

      - name: Prepare archive (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $pkg = "mod-updater-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $pkg -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mod-updater.exe" "$pkg/mod-updater.exe"
          Compress-Archive -Path $pkg -DestinationPath "$pkg.zip" -Force
          (Get-FileHash "$pkg.zip" -Algorithm SHA256).Hash.ToLower() + "  $pkg.zip" | Out-File -FilePath "$pkg.sha256" -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-updater-${{ matrix.target }}
          path: |
            mod-updater-${{ matrix.target }}.${{ matrix.archive_ext }}
            mod-updater-${{ matrix.target }}.sha256

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mod-updater-${{ matrix.target }}.${{ matrix.archive_ext }}
            mod-updater-${{ matrix.target }}.sha256
